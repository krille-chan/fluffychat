name: Release Workflow

on:
  release:
    types:
      - created

concurrency:
  group: release_workflow
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build_web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .tool_versions.yaml
          cache: true
      - uses: moonrepo/setup-rust@v1
      - run: rustup component add rust-src --toolchain nightly-x86_64-unknown-linux-gnu
      - run: flutter pub get
      - name: Prepare web
        run: ./scripts/prepare-web.sh
      - run: rm ./assets/vodozemac/.gitignore
      - name: Build Release Web
        run: flutter build web --dart-define=FLUTTER_WEB_CANVASKIT_URL=canvaskit/ --release --source-maps --base-href "/web/"
      - name: Create archive
        run: tar -czf fluffychat-web.tar.gz build/web/
      - name: Upload Web Build
        uses: actions/upload-artifact@v7
        with:
          name: Web Build
          path: fluffychat-web.tar.gz
      - name: Upload to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: fluffychat-web.tar.gz
          asset_name: fluffychat-web.tar.gz
          asset_content_type: application/gzip
      - name: Clone fluffychat website
        run: |
          git clone https://github.com/krille-chan/fluffychat-website.git
          cat CHANGELOG.md >> fluffychat-website/src/changelog.md
          cat PRIVACY.md >> fluffychat-website/src/privacy.md
      - name: Build website
        working-directory: fluffychat-website
        run: |
          npm install tailwindcss @tailwindcss/cli
          npx tailwindcss -i ./src/styles.css -o ./src/assets/tailwind.css --minify
          npx @11ty/eleventy
          mv public ../
      - name: Copy FluffyChat web into it
        run: |
          mkdir public/web
          mkdir public/nightly
          cp -r build/web/* public/web/
          cp -r build/web/* public/nightly/
          echo "fluffychat.im" >> public/CNAME
      - name: Deploy to GitHub Pages
        if: startsWith(github.ref, 'refs/tags/v')
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          cname: fluffychat.im

  build_apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .tool_versions.yaml
          cache: true
      - name: Add Firebase Messaging
        run: |
          echo '${{secrets.GOOGLE_SERVICES_JSON}}' | base64 -d > android/app/google-services.json
          ./scripts/add-firebase-messaging.sh
      - uses: ./.github/actions/free_up_space
      - uses: moonrepo/setup-rust@v1
      - run: flutter pub get
      - name: Prepare Android Release Build
        env:
          FDROID_KEY: ${{ secrets.FDROID_KEY }}
          FDROID_KEY_PASS: ${{ secrets.FDROID_KEY_PASS }}
          PLAYSTORE_DEPLOY_KEY: ${{ secrets.PLAYSTORE_DEPLOY_KEY }}
        run: ./scripts/prepare-android-release.sh
      - run: flutter build apk --release --target-platform android-arm,android-arm64
      - name: Upload to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: build/app/outputs/apk/release/app-release.apk
          asset_name: fluffychat.apk
          asset_content_type: application/vnd.android.package-archive

  build_windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .tool_versions.yaml
          cache: true
      - uses: moonrepo/setup-rust@v1
      - run: flutter pub get
      - name: Compute MSIX version
        run: |
          $versionLine = (Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$').Matches.Groups[1].Value
          $parts = $versionLine -split '\+'
          $base = $parts[0]
          $build = if ($parts.Length -gt 1 -and $parts[1]) { $parts[1] } else { "0" }
          $msixVersion = "$base.$build"
          echo "MSIX_VERSION=$msixVersion" >> $env:GITHUB_ENV
        shell: pwsh
      - name: Decode MSIX signing certificate
        env:
          MSIX_CERT_BASE64: ${{ secrets.MSIX_CERT_BASE64 }}
        run: |
          if (-not $env:MSIX_CERT_BASE64) {
            throw "MSIX_CERT_BASE64 is not set"
          }
          $certPath = Join-Path $env:RUNNER_TEMP "msix.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:MSIX_CERT_BASE64))
          echo "MSIX_CERT_PATH=$certPath" >> $env:GITHUB_ENV
        shell: pwsh
      - name: Build Windows
        run: flutter build windows --release
      - name: Include MSVC Runtime
        run: |
          Copy-Item -Path "C:\Windows\System32\msvcp140.dll" -Destination "build\windows\x64\runner\Release\"
          Copy-Item -Path "C:\Windows\System32\vcruntime140.dll" -Destination "build\windows\x64\runner\Release\"
          Copy-Item -Path "C:\Windows\System32\vcruntime140_1.dll" -Destination "build\windows\x64\runner\Release\"
          Copy-Item -Path "build\windows\x64\runner\Release\sqlite3.dll" -Destination "build\windows\x64\runner\Release\libsqlcipher.dll" -ErrorAction SilentlyContinue
        shell: pwsh
      - name: Prepare MSIX config
        env:
          MSIX_PUBLISHER_DISPLAY_NAME: ${{ secrets.MSIX_PUBLISHER_DISPLAY_NAME }}
          MSIX_PUBLISHER: ${{ secrets.MSIX_PUBLISHER }}
          MSIX_IDENTITY_NAME: ${{ secrets.MSIX_IDENTITY_NAME }}
          MSIX_CERT_PASSWORD: ${{ secrets.MSIX_CERT_PASSWORD }}
        run: |
          if (-not $env:MSIX_PUBLISHER_DISPLAY_NAME) { throw "MSIX_PUBLISHER_DISPLAY_NAME is not set" }
          if (-not $env:MSIX_PUBLISHER) { throw "MSIX_PUBLISHER is not set" }
          if (-not $env:MSIX_IDENTITY_NAME) { throw "MSIX_IDENTITY_NAME is not set" }
          if (-not $env:MSIX_CERT_PASSWORD) { throw "MSIX_CERT_PASSWORD is not set" }
          python - <<'PY'
          import os
          from pathlib import Path

          path = Path("pubspec.yaml")
          text = path.read_text(encoding="utf-8")
          replacements = {
              "__MSIX_PUBLISHER_DISPLAY_NAME__": os.environ["MSIX_PUBLISHER_DISPLAY_NAME"],
              "__MSIX_PUBLISHER__": os.environ["MSIX_PUBLISHER"],
              "__MSIX_IDENTITY_NAME__": os.environ["MSIX_IDENTITY_NAME"],
              "__MSIX_VERSION__": os.environ["MSIX_VERSION"],
              "__MSIX_CERT_PATH__": os.environ["MSIX_CERT_PATH"].replace("\\\\", "/"),
              "__MSIX_CERT_PASSWORD__": os.environ["MSIX_CERT_PASSWORD"],
          }
          for key, value in replacements.items():
              text = text.replace(key, value)
          path.write_text(text, encoding="utf-8")
          PY
        shell: pwsh
      - name: Build MSIX package
        run: flutter pub run msix:create
      - name: Locate MSIX package
        run: |
          $msix = Get-ChildItem -Path "build\windows\runner\Release" -Filter *.msix | Select-Object -First 1
          if (-not $msix) { throw "MSIX package not found" }
          echo "MSIX_PATH=$($msix.FullName)" >> $env:GITHUB_ENV
        shell: pwsh
      - name: Upload MSIX
        uses: actions/upload-artifact@v7
        with:
          name: fluffychat.msix
          path: ${{ env.MSIX_PATH }}
      - name: Create archive
        run: Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "fluffychat-windows.zip"
        shell: pwsh
      - name: Upload Windows
        uses: actions/upload-artifact@v7
        with:
          name: fluffychat-windows.zip
          path: fluffychat-windows.zip
      - name: Upload MSIX to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ env.MSIX_PATH }}
          asset_name: fluffychat.msix
          asset_content_type: application/vnd.ms-appx
      - name: Upload zip to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: fluffychat-windows.zip
          asset_name: fluffychat-windows.zip
          asset_content_type: application/zip
      - name: Submit MSIX to Microsoft Store
        uses: microsoft/store-submission@v1
        with:
          tenantId: ${{ secrets.MS_STORE_TENANT_ID }}
          clientId: ${{ secrets.MS_STORE_CLIENT_ID }}
          clientSecret: ${{ secrets.MS_STORE_CLIENT_SECRET }}
          sellerId: ${{ secrets.MS_STORE_SELLER_ID }}
          productId: ${{ secrets.MS_STORE_PRODUCT_ID }}
          packagePath: ${{ env.MSIX_PATH }}

  build_linux:
    strategy:
      matrix:
        arch: [ x64, arm64 ]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest'}}
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install curl clang cmake ninja-build pkg-config libgtk-3-dev libblkid-dev liblzma-dev libjsoncpp-dev cmake-data libsecret-1-dev libsecret-1-0 librhash0 libssl-dev libwebkit2gtk-4.1-dev -y
      - run: echo "FLUTTER_VERSION=$(yq '.environment.flutter' < .tool_versions.yaml)" >> $GITHUB_ENV
      - name: Install Flutter
        run: |
          git clone --branch ${{ env.FLUTTER_VERSION }} https://github.com/flutter/flutter.git
          ./flutter/bin/flutter doctor
      - uses: moonrepo/setup-rust@v1
      - run: ./flutter/bin/flutter pub get
      - run: ./flutter/bin/flutter build linux --target-platform linux-${{ matrix.arch }}
      - name: Create archive
        run: tar -czf fluffychat-linux-${{ matrix.arch }}.tar.gz -C build/linux/${{ matrix.arch }}/release/bundle/ .
      - name: Upload to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: fluffychat-linux-${{ matrix.arch }}.tar.gz
          asset_name: fluffychat-linux-${{ matrix.arch }}.tar.gz
          asset_content_type: application/gzip

  deploy_playstore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .tool_versions.yaml
          cache: true
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - uses: ./.github/actions/free_up_space
      - uses: moonrepo/setup-rust@v1
      - name: Install Fastlane
        working-directory: android
        run: gem install fastlane -NV
      - name: Add Firebase Messaging
        run: |
          echo '${{secrets.GOOGLE_SERVICES_JSON}}' | base64 -d > android/app/google-services.json
          ./scripts/add-firebase-messaging.sh
      - run: flutter pub get
      - name: Prepare Android Release Build
        env:
          FDROID_KEY: ${{ secrets.FDROID_KEY }}
          FDROID_KEY_PASS: ${{ secrets.FDROID_KEY_PASS }}
          PLAYSTORE_DEPLOY_KEY: ${{ secrets.PLAYSTORE_DEPLOY_KEY }}
        run: ./scripts/prepare-android-release.sh
      - name: Build Android Release
        run: flutter build appbundle --target-platform android-arm,android-arm64
      - name: Get Tag Name
        id: tag_name
        run: echo "::set-output name=tag::$(echo ${GITHUB_REF#refs/tags/})"
      - name: Deploy Android Release
        run: |
          mkdir -p build/android
          cp build/app/outputs/bundle/release/app-release.aab build/android/
          cd android
          bundle install
          bundle update fastlane
          bundle exec fastlane deploy_internal_test
          if [[ $GITHUB_REF_NAME == rc* ]]; then
              bundle exec fastlane deploy_candidate
          else
              bundle exec fastlane deploy_release
          fi
          cd ..

  deploy_docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6
      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
