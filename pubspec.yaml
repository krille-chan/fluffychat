name: fluffychat
description: Chat with your friends.
publish_to: none
# On version bump please also increase:
# 1. The build number (for F-Droid)
# 2. The version in /snap/snapcraft.yaml
version: 2.8.0+3558

environment:
  sdk: ">=3.11.1 <4.0.0"

dependencies:
  archive: ^4.0.7
  async: ^2.13.1
  badges: ^3.2.0
  blurhash_dart: ^1.2.1
  chewie: ^1.14.1
  collection: ^1.18.0
  crop_image: ^1.0.17
  cross_file: ^0.3.5
  desktop_drop: ^0.7.1
  device_info_plus: ^13.2.0
  dynamic_color: ^1.8.1
  emoji_picker_flutter: ^4.4.0
  file_picker: ^12.0.0-beta.7
  file_selector: ^1.1.0
  flutter:
    sdk: flutter
  flutter_foreground_task: ^10.0.0
  flutter_linkify: ^6.0.0
  flutter_local_notifications: ^22.0.1
  flutter_localizations:
    sdk: flutter
  flutter_map: ^8.3.1
  flutter_new_badger: ^1.1.1
  flutter_secure_storage: ^10.3.1
  flutter_shortcuts_new: ^2.0.0
  flutter_vodozemac: ^0.5.0
  flutter_web_auth_2: ^5.0.3
  flutter_webrtc: ^1.5.2
  geolocator: ^14.0.3
  go_router: ^17.3.0
  handy_window: ^0.4.2
  highlight: ^0.7.0
  html: ^0.15.4
  http: ^1.6.0
  image: ^4.7.2
  image_picker: ^1.2.3
  intl: any
  just_audio: ^0.10.6
  latlong2: ^0.10.1
  local_auth: ^3.0.2
  matrix: #^8.1.0
    git:
      url: https://github.com/famedly/matrix-dart-sdk.git
      ref: main
  mime: ^2.0.0
  native_imaging: ^0.4.0
  opus_caf_converter_dart: ^1.0.1
  package_info_plus: ^10.2.0
  particles_network: ^1.9.5
  pasteboard: ^0.5.0
  path: ^1.9.0
  path_provider: ^2.1.6
  path_provider_foundation: ^2.6.0
  pretty_qr_code: ^3.6.0
  provider: ^6.0.2
  punycode: ^1.0.0
  qr_code_scanner_plus: ^2.2.0
  qr_image: ^1.0.0
  receive_sharing_intent: ^1.8.1
  record: ^7.1.1
  scroll_to_index: ^3.0.1
  share_plus: ^13.2.1
  shared_preferences: ^2.5.5 # Pinned because https://github.com/flutter/flutter/issues/118401
  slugify: ^2.0.0
  sqflite_common_ffi: ^2.4.2
  swipe_to_action: ^0.3.0
  unifiedpush: ^6.2.0
  unifiedpush_ui: ^0.2.0
  universal_html: ^2.3.0
  url_launcher: ^6.3.2
  video_compress: ^3.1.4
  video_player: ^2.13.0
  wakelock_plus: ^1.6.1
  webrtc_interface: ^1.5.1

dev_dependencies:
  dart_code_linter: ^4.1.6
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  license_checker: ^1.6.2

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/
    - assets/logo/mini/
    - assets/sounds/
    - assets/vodozemac/

hooks:
  user_defines:
    sqlite3:
      source: sqlcipher

flutter_launcher_icons:
  image_path: assets/logo/img/logo.png
  android: true
  adaptive_icon_foreground: assets/logo/img/logo_foreground.png
  adaptive_icon_background: assets/logo/img/logo_background.png
  adaptive_icon_monochrome: assets/logo/img/logo_mono.png
  ios: true
  macos:
    generate: true
  windows:
    generate: true
  web:
    generate: true
    image_path: assets/logo/img/logo_standalone.png
    background_color: "#FFFFFF"
    theme_color: "#41a2bc"

# Guidelines for adding a dependency override:
# 1. Don't do it if you can avoid it or fix it upstream in a manageable time
# 2. Always link an (upstream?) issue
# 3. Explain how and when this can be removed (overrides must be temporarily)
dependency_overrides:
